<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="Loma Linda University">
  <style>
    .llu-big { font: 700 30px/1 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #000; letter-spacing: -0.01em; }
    .llu-sub { font: 500 9.5px/1.3 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #1a1a1a; letter-spacing: 0.16em; text-transform: uppercase; }
    .llu-accent { fill: #862633; }
  </style>
  <rect x="0" y="20" width="6" height="40" class="llu-accent"/>
  <text x="18" y="42" class="llu-big">Loma Linda</text>
  <text x="18" y="58" class="llu-sub">University,</text>
  <text x="18" y="70" class="llu-sub">School of Medicine</text>
</svg>
