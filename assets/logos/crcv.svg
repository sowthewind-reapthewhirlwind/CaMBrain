<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="Center for Research in Computer Vision">
  <style>
    .crcv-big { font: 700 36px/1 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #000; letter-spacing: 0.02em; }
    .crcv-sub { font: 500 9.5px/1.3 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #1a1a1a; letter-spacing: 0.16em; text-transform: uppercase; }
    .crcv-accent { fill: #BA9B37; }
  </style>
  <rect x="0" y="20" width="6" height="40" class="crcv-accent"/>
  <text x="18" y="44" class="crcv-big">CRCV</text>
  <text x="18" y="58" class="crcv-sub">Center for Research</text>
  <text x="18" y="70" class="crcv-sub">in Computer Vision</text>
</svg>
