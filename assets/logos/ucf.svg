<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="University of Central Florida">
  <style>
    .ucf-big { font: 800 42px/1 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #000; letter-spacing: -0.02em; }
    .ucf-sub { font: 500 10px/1.3 'IBM Plex Sans', 'Helvetica Neue', sans-serif; fill: #1a1a1a; letter-spacing: 0.18em; text-transform: uppercase; }
    .ucf-accent { fill: #BA9B37; }
  </style>
  <rect x="0" y="18" width="6" height="44" class="ucf-accent"/>
  <text x="18" y="47" class="ucf-big">UCF</text>
  <text x="18" y="62" class="ucf-sub">University of</text>
  <text x="18" y="74" class="ucf-sub">Central Florida</text>
</svg>
